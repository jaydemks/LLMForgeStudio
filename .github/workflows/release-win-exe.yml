name: Release Windows EXE

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish self-contained single-file EXE
        run: >
          dotnet publish src/LLMForgeStudio.App/LLMForgeStudio.App.csproj
          -c Release
          -r win-x64
          --self-contained true
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true

      - name: Prepare release folder
        shell: pwsh
        run: |
          $outDir = "src/LLMForgeStudio.App/bin/Release/net8.0/win-x64/publish"
          New-Item -Path release -ItemType Directory -Force | Out-Null
          Copy-Item "$outDir/*" -Destination release -Recurse -Force
          New-Item -Path "release/backends/python" -ItemType Directory -Force | Out-Null
          Copy-Item "backends/python/train_stub.py" -Destination "release/backends/python" -Force
          Copy-Item "backends/python/generate_stub.py" -Destination "release/backends/python" -Force
          Copy-Item "backends/python/device_probe.py" -Destination "release/backends/python" -Force
          Copy-Item "backends/python/requirements.txt" -Destination "release/backends/python" -Force
          Copy-Item "backends/python/BACKEND_PROTOCOL.md" -Destination "release/backends/python" -Force
          if (Test-Path "samples") {
            Copy-Item "samples" -Destination "release/samples" -Recurse -Force
          }
          Copy-Item "LICENSE" -Destination release -Force
          Copy-Item "THIRD_PARTY_NOTICES.md" -Destination release -Force

      - name: Zip artifact
        shell: pwsh
        run: |
          Compress-Archive -Path "release/*" -DestinationPath "LLMForgeStudio-win-x64.zip" -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: LLMForgeStudio-win-x64
          path: LLMForgeStudio-win-x64.zip

      - name: Resolve target release tag
        id: release_tag
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ("${{ github.event_name }}" -eq "release") {
            "tag=${{ github.event.release.tag_name }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            exit 0
          }

          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept        = "application/vnd.github+json"
          }
          $url = "https://api.github.com/repos/${{ github.repository }}/releases/latest"
          $resp = Invoke-RestMethod -Uri $url -Headers $headers -Method Get
          if (-not $resp.tag_name) {
            throw "No latest release found. Publish at least one release first."
          }
          "tag=$($resp.tag_name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          files: LLMForgeStudio-win-x64.zip
          overwrite_files: true
